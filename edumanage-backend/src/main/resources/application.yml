spring:
  application:
    name: edumanage-backend
  datasource:
    url: jdbc:h2:mem:edumanage_db
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: placeholder_client_id
            client-secret: placeholder_client_secret
            scope:
              - email
              - profile

server:
  port: 8080

edumanage:
  upload-dir: uploads/tickets/
